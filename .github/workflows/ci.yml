name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Dioxus desktop links against WebKitGTK and GTK3; libxdo backs the
      # global-shortcut / input handling. Required to build the desktop target.
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all --check
      # Two clippy passes. The first omits --all-targets on purpose: with
      # test targets excluded, a pub(crate) item referenced only from
      # #[cfg(test)] code still trips the dead-code lint, so the dead-code
      # gate keeps working. The second adds --all-targets to lint test and
      # example code that the first pass never compiles.
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
