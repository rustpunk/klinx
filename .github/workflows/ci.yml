name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Dioxus desktop links against WebKitGTK and GTK3 on Linux; libxdo backs
      # the global-shortcut / input handling. macOS (WKWebView) and Windows
      # (WebView2, preinstalled on the runner) need no extra system packages.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libxdo-dev

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # The dx CLI builds the desktop bundle. binstall pulls the prebuilt
      # 0.7.4 binary (matches the workspace's pinned dioxus = "=0.7.4").
      - uses: cargo-bins/cargo-binstall@main
      - name: Install dx (Dioxus CLI)
        run: cargo binstall -y dioxus-cli@0.7.4

      # Formatting is OS-independent; check once on Linux to avoid Windows
      # CRLF false-positives.
      - name: Format
        if: runner.os == 'Linux'
        run: cargo fmt --all --check

      # Two clippy passes. The first omits --all-targets on purpose: with
      # test targets excluded, a pub(crate) item referenced only from
      # #[cfg(test)] code still trips the dead-code lint, so the dead-code
      # gate keeps working. The second adds --all-targets to lint test and
      # example code that the first pass never compiles.
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Clippy (all targets)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # Verify the actual desktop bundle compiles on each platform, not just
      # the library/binary crates.
      - name: Build desktop bundle
        run: dx build --package klinx --platform desktop

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
