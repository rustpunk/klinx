_template:
  name: "CSV Dedup"
  description: "Deduplicate CSV records by key fields"
  category: "transform"
  tags: ["csv", "distinct", "dedup"]
  author: "clinker"
  version: "1.0"

pipeline:
  name: csv-dedup

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: "./data/input.csv"
      options:
        has_header: true
      schema:
        - { name: id, type: string }

  - type: transform
    name: deduplicate
    input: source
    config:
      cxl: |
        distinct by id

  - type: output
    name: result
    input: deduplicate
    config:
      name: result
      type: csv
      path: "./output/deduped.csv"
