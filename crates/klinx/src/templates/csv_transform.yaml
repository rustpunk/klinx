_template:
  name: "CSV Transform"
  description: "Read CSV, apply filters and maps, write CSV"
  category: "transform"
  tags: ["csv", "filter", "map"]
  author: "clinker"
  version: "1.0"
  hints:
    "nodes[0].config.path": "replace with your source path"
    "nodes[3].config.path": "replace with your output path"
    "nodes[1].config.cxl": "your filter expression"
    "nodes[2].config.cxl": "your map expressions"

pipeline:
  name: csv-transform

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: "./data/input.csv"
      options:
        has_header: true
      schema:
        - { name: status, type: string }
        - { name: first_name, type: string }
        - { name: last_name, type: string }

  - type: transform
    name: filter_active
    input: source
    config:
      cxl: |
        filter status == "active"

  - type: transform
    name: compute_fields
    input: filter_active
    config:
      cxl: |
        emit full_name = first_name + " " + last_name

  - type: output
    name: result
    input: compute_fields
    config:
      name: result
      type: csv
      path: "./output/result.csv"
