_template:
  name: "Multi-Source Join"
  description: "Join two CSV sources on a shared key"
  category: "join"
  tags: ["csv", "join", "lookup"]
  author: "clinker"
  version: "1.0"
  hints:
    "nodes[0].config.path": "primary source path"
    "nodes[1].config.path": "lookup source path"
    "nodes[2].config.cxl": "join key and fields to pull"

pipeline:
  name: csv-join

nodes:
  - type: source
    name: primary
    config:
      name: primary
      type: csv
      path: "./data/primary.csv"
      options:
        has_header: true
      schema:
        - { name: id, type: string }

  - type: source
    name: lookup
    config:
      name: lookup
      type: csv
      path: "./data/lookup.csv"
      options:
        has_header: true
      schema:
        - { name: key, type: string }
        - { name: region_name, type: string }

  - type: transform
    name: enrich
    input: primary
    config:
      cxl: |
        lookup_join lookup on key = id
          pull region_name

  - type: output
    name: result
    input: enrich
    config:
      name: result
      type: csv
      path: "./output/joined.csv"
