_template:
  name: "JSON Flatten"
  description: "Flatten nested JSON to CSV with field extraction"
  category: "transform"
  tags: ["json", "csv", "flatten"]
  author: "clinker"
  version: "1.0"

pipeline:
  name: json-flatten

nodes:
  - type: source
    name: source
    config:
      name: source
      type: json
      path: "./data/input.json"
      schema:
        - { name: id, type: string }
        - { name: name, type: string }
        - { name: email, type: string }

  - type: transform
    name: extract_fields
    input: source
    config:
      cxl: |
        emit id = id
        emit name = name
        emit email = email

  - type: output
    name: result
    input: extract_fields
    config:
      name: result
      type: csv
      path: "./output/flattened.csv"
