_template:
  name: "Full ETL Pipeline"
  description: "Complete extract-transform-load with validation, filtering, and output"
  category: "etl"
  tags: ["csv", "filter", "map", "sort", "etl"]
  author: "clinker"
  version: "1.0"

pipeline:
  name: full-etl
  memory: { limit: 2GB }

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: "./data/input.csv"
      options:
        has_header: true
      schema:
        - { name: id, type: string }
        - { name: email, type: string }
        - { name: first_name, type: string }
        - { name: last_name, type: string }

  - type: transform
    name: validate
    description: "Filter out invalid records"
    input: source
    config:
      cxl: |
        filter id != null
        filter email.contains("@")

  - type: transform
    name: enrich
    description: "Compute derived fields"
    input: validate
    config:
      cxl: |
        emit full_name = first_name + " " + last_name
        emit domain = email.split("@").last()

  - type: transform
    name: sort_output
    description: "Sort by last name"
    input: enrich
    config:
      cxl: |
        sort by last_name asc

  - type: output
    name: result
    input: sort_output
    config:
      name: result
      type: csv
      path: "./output/result.csv"
      include_header: true

error_handling:
  strategy: continue
  dlq:
    path: "./output/errors.csv"
    include_reason: true
