_template:
  name: "XML Extract"
  description: "Extract XML records to CSV"
  category: "transform"
  tags: ["xml", "csv", "extract"]
  author: "clinker"
  version: "1.0"

pipeline:
  name: xml-extract

nodes:
  - type: source
    name: source
    config:
      name: source
      type: xml
      path: "./data/input.xml"
      options:
        record_element: record
      schema:
        - { name: id, type: string }
        - { name: value, type: string }

  - type: transform
    name: select_fields
    input: source
    config:
      cxl: |
        emit id = id
        emit value = value

  - type: output
    name: result
    input: select_fields
    config:
      name: result
      type: csv
      path: "./output/extracted.csv"
