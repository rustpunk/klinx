# Synthetic large pipeline for performance measurement (see docs/perf.md).
# A long linear chain of transform stages: stresses the YAML tokenizer, the
# editor's per-line DOM rendering, and the parse/canvas fan-out. Regenerate
# with the snippet in docs/perf.md.
pipeline:
  name: perf-large

nodes:
  - type: source
    name: source
    config:
      name: source
      type: csv
      path: "./data/input.csv"
      options:
        has_header: true
      schema:
        - { name: status, type: string }
        - { name: amount, type: int }
        - { name: region, type: string }

  - type: transform
    name: stage_0001
    input: source
    config:
      cxl: |
        filter amount > 0
        emit doubled = amount * 2
        emit tag = status + "-" + region

