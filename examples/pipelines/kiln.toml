# kiln.toml — Clinker Kiln workspace manifest
# This is the example workspace for developing and testing Kiln features.

[workspace]
name = "clinker-examples"

[pipelines]
include = ["*.yaml"]

[schema]
directory = "schemas"
infer_sample_rows = 1000

[compositions]
directory = "compositions"

[cli]
binary = "clinker"
