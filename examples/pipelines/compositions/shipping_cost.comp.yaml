# Calculate shipping cost from weight and shipping method.
_compose:
  name: shipping_cost
  inputs:
    shipments:
      schema:
        - { name: weight_kg, type: float }
        - { name: shipping_method, type: string }
        - { name: quantity, type: int }
  outputs:
    priced: total_shipping
  config_schema: {}

nodes:
  - type: transform
    name: compute_weight
    input: shipments
    config:
      cxl: |
        emit shipping_weight = weight_kg * quantity
  # Rate per kg by shipping method.
  - type: transform
    name: base_rate
    input: compute_weight
    config:
      cxl: |
        emit base_shipping = if shipping_method == "express" then 2.50 else if shipping_method == "overnight" then 4.75 else 1.20
  - type: transform
    name: total_shipping
    input: base_rate
    config:
      cxl: |
        emit shipping_cost = shipping_weight * base_shipping
