# Normalize and deduplicate name fields.
_compose:
  name: clean_names
  inputs:
    names:
      schema:
        - { name: first_name, type: string }
        - { name: last_name, type: string }
  outputs:
    cleaned: normalize_names
  config_schema: {}

nodes:
  - type: transform
    name: normalize_names
    input: names
    config:
      cxl: |
        emit full_name = first_name.trim() + " " + last_name.trim()
        emit name_key = (first_name.trim() + "_" + last_name.trim()).lower()
