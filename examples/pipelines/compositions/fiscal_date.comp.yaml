_compose:
  name: "Fiscal Date Fields"
  description: "Derive fiscal year, quarter, and period from a date field"
  version: "2.0"
  contract:
    requires:
      - name: invoice_date
        type: date
    produces:
      - name: fiscal_year
        type: int
      - name: fiscal_quarter
        type: string
      - name: fiscal_period
        type: string
      - name: fiscal_month
        type: int
      - name: is_current_fy
        type: bool

transformations:
  - name: compute_fiscal_year
    description: "Fiscal year starts April 1 — dates in Jan-Mar belong to prior FY"
    cxl: |
      let month = invoice_date.month()
      emit fiscal_year = if month < 4 then invoice_date.year() else invoice_date.year() + 1
  - name: compute_fiscal_quarter
    cxl: |
      let month = invoice_date.month()
      emit fiscal_quarter = if month >= 4 and month <= 6 then "Q1" else if month >= 7 and month <= 9 then "Q2" else if month >= 10 and month <= 12 then "Q3" else "Q4"
      emit fiscal_month = if month >= 4 then month - 3 else month + 9
  - name: compute_fiscal_period
    cxl: |
      emit fiscal_period = "FY" + fiscal_year.to_string() + "-" + fiscal_quarter
  - name: flag_current_fy
    cxl: |
      emit is_current_fy = fiscal_year == current_fiscal_year()
