# Normalize and validate email addresses.
_compose:
  name: validate_email
  inputs:
    emails:
      schema:
        - { name: email, type: string }
  outputs:
    validated: extract_domain
  config_schema: {}

nodes:
  - type: transform
    name: normalize_email
    input: emails
    config:
      cxl: |
        emit email_lower = email.trim().lower()
  - type: transform
    name: check_email_format
    input: normalize_email
    config:
      cxl: |
        emit email_valid = email_lower.matches("^[^@]+@[^@]+\\.[^@]+$")
  - type: transform
    name: extract_domain
    input: check_email_format
    config:
      cxl: |
        emit email_domain = email_lower.capture("@(.+)", 1)
