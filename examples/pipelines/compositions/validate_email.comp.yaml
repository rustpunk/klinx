_compose:
  name: "Validate Email"
  description: "Normalize and validate email addresses"
  version: "1.1"
  contract:
    requires:
      - name: email
        type: string
    produces:
      - name: email_lower
        type: string
      - name: email_valid
        type: bool
      - name: email_domain
        type: string

transformations:
  - name: normalize_email
    cxl: |
      emit email_lower = email.trim().lower()
  - name: check_email_format
    cxl: |
      emit email_valid = email_lower.matches("^[^@]+@[^@]+\\.[^@]+$")
  - name: extract_domain
    cxl: |
      emit email_domain = email_lower.capture("@(.+)", 1)
