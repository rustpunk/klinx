# Classify orders by value tier, priority, risk, and fulfillment status.
_compose:
  name: order_classification
  inputs:
    orders:
      schema:
        - { name: line_total, type: float }
        - { name: shipping_method, type: string }
        - { name: status, type: string }
        - { name: order_date_parsed, type: date }
  outputs:
    classified: order_score
  config_schema: {}

nodes:
  # Classify by order value.
  - type: transform
    name: value_tier
    input: orders
    config:
      cxl: |
        emit value_tier = if line_total >= 1000 then "premium" else if line_total >= 250 then "standard" else "economy"
  # Derive priority from method and value.
  - type: transform
    name: priority_level
    input: value_tier
    config:
      cxl: |
        emit priority_level = if shipping_method == "overnight" then "urgent" else if shipping_method == "express" and line_total >= 500 then "high" else if line_total >= 1000 then "high" else "normal"
  - type: transform
    name: order_age
    input: priority_level
    config:
      cxl: |
        emit days_since_order = order_date_parsed.diff_days($pipeline.start_time)
  # Flag stale or high-value unshipped orders.
  - type: transform
    name: fulfillment_risk
    input: order_age
    config:
      cxl: |
        emit fulfillment_risk = if status == "pending" and days_since_order > 7 then "overdue" else if status == "pending" and value_tier == "premium" then "watch" else "ok"
  # Composite score for sorting/reporting.
  - type: transform
    name: order_score
    input: fulfillment_risk
    config:
      cxl: |
        let tier_weight = if value_tier == "premium" then 3.0 else if value_tier == "standard" then 2.0 else 1.0
        let urgency_weight = if priority_level == "urgent" then 3.0 else if priority_level == "high" then 2.0 else 1.0
        emit order_score = tier_weight * urgency_weight * (1.0 + days_since_order.to_float() / 30.0)
