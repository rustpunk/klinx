# Express Logistics channel for the order_fulfillment pipeline.
#
# New-engine channels (rev 997ea7d) bind only the target's *declared*
# configuration — they no longer patch the graph mid-stream. This channel
# pins the express surcharge knob (declared as `$vars.express_surcharge` on
# order_fulfillment) to a premium rate via a `fixed` var override so it cannot
# be relaxed downstream.
channel:
  name: express-logistics
  target: ../../order_fulfillment.yaml

vars:
  static:
    express_surcharge:
      type: float
      default: 8.99
