# Acme Corp channel for the customer_etl pipeline.
#
# Acme runs a higher-value customer base, so it re-pins the gold/standard
# tier boundary (`$vars.tier_threshold`, declared on customer_etl) upward via
# a `fixed` override that downstream layers cannot relax.
channel:
  name: acme-corp
  target: ../../customer_etl.yaml

vars:
  static:
    tier_threshold:
      type: int
      default: 50000
