# Warehouse West channel for the order_fulfillment pipeline.
#
# West-coast pricing uses a lower high-value threshold than the pipeline
# default. The channel re-declares the `$vars.high_value_threshold` knob with
# a regional default; the surcharge knob is left at the pipeline default.
channel:
  name: warehouse-west
  target: ../../order_fulfillment.yaml

vars:
  static:
    high_value_threshold:
      type: int
      default: 300
