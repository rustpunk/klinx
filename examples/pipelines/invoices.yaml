pipeline:
  name: invoice_rollup

nodes:
  - type: source
    name: invoices
    config:
      name: invoices
      type: csv
      path: ./data/invoices.csv
      options:
        has_header: true
      schema:
        - { name: invoice_id, type: string }
        - { name: invoice_date, type: string }
        - { name: customer_id, type: string }
        - { name: amount, type: float }

  - type: source
    name: customers
    config:
      name: customers
      type: csv
      path: ./data/customers.csv
      options:
        has_header: true
      schema:
        - { name: customer_id, type: string }
        - { name: first_name, type: string }
        - { name: last_name, type: string }

  - type: transform
    name: recent_only
    # CXL at engine rev 997ea7d exposes no relative-date builtin (no `days_since`
    # / `now`-based arithmetic in the typechecked surface), so a "recent" filter
    # is expressed as an absolute cutoff: parse the ISO date column with
    # `to_date` and compare against a fixed `#YYYY-MM-DD#` date literal.
    description: Filter to invoices on or after the cutoff date
    input: invoices
    config:
      cxl: |
        emit _include = invoice_date.to_date("%Y-%m-%d") >= #2024-01-01#

  # Aggregation lives on a dedicated `aggregate` node in the new engine —
  # `sum`/`count` are rejected inside a row-level `transform`. An empty
  # `group_by` would fold to a single row; here we roll up per customer.
  - type: aggregate
    name: totals
    description: Sum invoice amounts per customer
    input: recent_only
    config:
      group_by: [customer_id]
      cxl: |
        emit customer_id = customer_id
        emit total_amount = sum(amount)
        emit invoice_count = count(invoice_id)

  - type: output
    name: rollup
    input: totals
    config:
      name: rollup
      type: csv
      path: ./output/invoice_rollup.csv
      include_unmapped: false

error_handling:
  strategy: continue
